<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop Management</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar {
            height: 100vh;
            background-color: #fff;
            border-right: 1px solid #ddd;
            padding-top: 20px;
        }
        .nav-link {
            color: #333;
            opacity: 0.6;
            padding: 10px 20px;
            margin-bottom: 5px;
            border-radius: 5px;
            transition: all 0.2s ease-in-out;
        }
        .nav-link:hover { opacity: 0.8; background-color: #f1f1f1;}
        .nav-link.active {
            font-weight: bold;
            opacity: 1;
            background-color: #e9ecef;
            color: #0d6efd;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse shadow-sm position-fixed">
                <div class="position-sticky">
                    <h4 class="text-center text-primary fw-bold mb-4 mt-2">☕ Coffee Shop</h4>
                    <ul class="nav flex-column mb-auto px-2">
                        <li class="nav-item">
                            <a class="nav-link {% if request.resolver_match.url_name == 'add_order' %}active{% endif %}" href="{% url 'add_order' %}">
                                Thêm đơn hàng
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.resolver_match.url_name == 'today_revenue' %}active{% endif %}" href="{% url 'today_revenue' %}">
                                Doanh thu hôm nay
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">
                                Tổng hợp thông tin
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    
    <!-- Bootstrap JS Bundle CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
